name: Update stream history

on:
  workflow_dispatch:
  schedule:
    - cron: '41 18 * * *'

permissions:
  contents: write

jobs:
  update-history:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch YouTube stream history
        run: node scripts/fetch-youtube-schedule.mjs --scope=history
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Commit data changes
        run: |
          if git diff --quiet -- public/data/schedule.json public/data/channels.json public/data/health.json; then
            echo "No data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/schedule.json public/data/channels.json public/data/health.json
          git commit -m "Update YouTube stream history"
          git push
