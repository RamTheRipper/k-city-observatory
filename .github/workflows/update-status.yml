name: Update stream status

on:
  workflow_dispatch:
  schedule:
    - cron: '23 * * * *'

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh YouTube stream status
        run: node scripts/fetch-youtube-schedule.mjs --scope=status
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Commit data changes
        run: |
          if git diff --quiet -- public/data/schedule.json public/data/health.json; then
            echo "No data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/schedule.json public/data/health.json
          git commit -m "Update YouTube stream status"
          git pull --rebase
          git push
