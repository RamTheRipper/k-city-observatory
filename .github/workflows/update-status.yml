name: Update stream status

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3,9,15,21 * * *'

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh YouTube stream status
        run: node scripts/fetch-youtube-schedule.mjs --scope=status
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Commit data changes
        run: |
          echo "Changed files after status refresh:"
          git status --short -- public/data/schedule.json public/data/health.json

          if git diff --quiet -- public/data/schedule.json public/data/health.json; then
            echo "No data changes."
            exit 0
          fi

          echo "Data timestamps:"
          node -e 'const fs=require("fs"); for (const file of ["public/data/schedule.json","public/data/health.json"]) { const data=JSON.parse(fs.readFileSync(file,"utf8")); console.log(file + ": generatedAt=" + (data.generatedAt || "(none)") + " lastSuccessAt=" + (data.apiUsage?.lastSuccessAt || "(n/a)") + " lastError=" + (data.apiUsage?.lastError?.message || "(none)")); }'

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/schedule.json public/data/health.json
          git commit -m "Update YouTube stream status"
          git pull --rebase
          git push
